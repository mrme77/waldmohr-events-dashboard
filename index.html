<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Waldmohr Events Dashboard</title>
    <link rel="stylesheet" href="./src/styles.css">
    <script src="./data/events.js" defer></script>
    <script src="./src/app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Local English Dashboard</p>
        <h1>Waldmohr Events</h1>
      </div>
      <div class="freshness" aria-live="polite">
        <span>Last refreshed</span>
        <strong id="last-refreshed">Loading...</strong>
      </div>
    </header>

    <main class="layout">
      <section class="control-band" aria-label="Event controls">
        <label class="search-field">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="Try museum, kids, clubs...">
        </label>
        <fieldset class="filters">
          <legend>Filters</legend>
          <label><input type="checkbox" value="family"> Family</label>
          <label><input type="checkbox" value="community"> Community</label>
          <label><input type="checkbox" value="culture"> Culture</label>
          <label><input type="checkbox" value="outdoors"> Outdoors</label>
          <label><input type="checkbox" value="civic"> Civic</label>
          <label><input type="checkbox" value="clubs"> Clubs</label>
        </fieldset>
      </section>

      <section class="calendar-section" aria-labelledby="calendar-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Month View</p>
            <h2 id="calendar-title">June 2026</h2>
          </div>
          <p id="calendar-note">Events are source-linked and marked past/upcoming.</p>
        </div>
        <div class="calendar" id="calendar-grid" aria-label="Calendar grid"></div>
      </section>

      <section class="events-section" aria-labelledby="events-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Agenda</p>
            <h2 id="events-title">Current Feed</h2>
          </div>
          <p id="event-count">Loading events...</p>
        </div>
        <div class="events-list" id="events-list"></div>
      </section>
    </main>

    <aside class="detail-panel" id="detail-panel" aria-labelledby="detail-title" aria-hidden="true">
      <button class="close-button" id="close-detail" type="button" aria-label="Close event details">x</button>
      <p class="eyebrow" id="detail-status">Event</p>
      <h2 id="detail-title"></h2>
      <p id="detail-summary"></p>
      <dl class="detail-list">
        <div>
          <dt>Date</dt>
          <dd id="detail-date"></dd>
        </div>
        <div>
          <dt>Venue</dt>
          <dd id="detail-venue"></dd>
        </div>
        <div>
          <dt>Original title</dt>
          <dd id="detail-original"></dd>
        </div>
      </dl>
      <a class="source-link" id="detail-source" href="#" target="_blank" rel="noreferrer">Open source post</a>
    </aside>
  </body>
</html>
